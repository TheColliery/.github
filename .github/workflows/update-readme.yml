name: Update Traffic Stats Badges

on:
  schedule:
    - cron: '15 0 * * *' # Daily at 00:15 UTC (07:15 AM Thailand time)
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # least-privilege: granted at the JOB, not the whole workflow
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - name: Run Stats Update Script
        env:
          # Only PAT_TOKEN — the traffic API needs a user PAT; GITHUB_TOKEN can't satisfy it
          # (403), so exposing it only enabled a silent wrong-token fallback. Missing PAT now
          # fails loud in the script. The push step below uses checkout's own git auth.
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: node scripts/update-readme.mjs

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/README.md README.md
          if ! git diff --cached --quiet; then
            git commit -m "ci: update traffic stats badges"
            git push origin main
          else
            echo "No changes in traffic stats detected."
          fi
