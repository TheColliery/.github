version: 2
updates:
  # The org landing repo ships GitHub Actions workflows (update-readme, skillspector-version-watch).
  # Keep their pinned actions fresh — Dependabot opens a PR when a pinned action has a newer release.
  # (The plugin repos CM/CT/CB each already have this; .github was the gap — R3A-3.)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
